services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: guvenli_izler
      POSTGRES_PASSWORD: guvenli_izler_dev
      POSTGRES_DB: guvenli_izler
    ports:
      - "5432:5432"
    volumes:
      - postgis_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U guvenli_izler -d guvenli_izler"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgis_data:
